<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid slice">
  <!-- Wall -->
  <rect x="0" y="0" width="400" height="280" fill="#f2cfa4"/>
  <!-- Subtle wall shadow at top -->
  <rect x="0" y="0" width="400" height="20" fill="#e8b87a" opacity="0.4"/>

  <!-- Window frame -->
  <rect x="50" y="50" width="120" height="120" fill="#4a2a14"/>
  <!-- Window pane (warm sunset gradient feel via stacked rects) -->
  <rect x="56" y="56" width="108" height="108" fill="#ffd270"/>
  <rect x="56" y="56" width="108" height="36" fill="#ffb04a"/>
  <rect x="56" y="56" width="108" height="14" fill="#f08858"/>
  <!-- Window mullions -->
  <rect x="108" y="56" width="4" height="108" fill="#4a2a14"/>
  <rect x="56" y="106" width="108" height="4" fill="#4a2a14"/>
  <!-- Window sill -->
  <rect x="46" y="170" width="128" height="6" fill="#3a200e"/>

  <!-- Hanging lamp cord + bulb on the right -->
  <rect x="298" y="0" width="2" height="40" fill="#4a2a14"/>
  <rect x="288" y="38" width="22" height="14" fill="#c46a3a"/>
  <rect x="290" y="52" width="18" height="4" fill="#a04a20"/>
  <!-- Lamp glow -->
  <rect x="280" y="56" width="38" height="10" fill="#ffd270" opacity="0.35"/>
  <rect x="284" y="66" width="30" height="20" fill="#ffd270" opacity="0.18"/>

  <!-- Floor -->
  <rect x="0" y="280" width="400" height="120" fill="#9c6a44"/>
  <!-- Floor plank divisions -->
  <rect x="0" y="280" width="400" height="3" fill="#6a4020"/>
  <rect x="0" y="320" width="400" height="2" fill="#6a4020" opacity="0.5"/>
  <rect x="0" y="360" width="400" height="2" fill="#6a4020" opacity="0.5"/>
  <!-- Vertical plank lines -->
  <rect x="80" y="282" width="1" height="118" fill="#6a4020" opacity="0.4"/>
  <rect x="180" y="282" width="1" height="118" fill="#6a4020" opacity="0.4"/>
  <rect x="280" y="282" width="1" height="118" fill="#6a4020" opacity="0.4"/>

  <!-- Table top -->
  <rect x="70" y="248" width="260" height="14" fill="#5a3010"/>
  <rect x="70" y="248" width="260" height="3" fill="#7a4a20"/>
  <!-- Table apron -->
  <rect x="82" y="262" width="236" height="8" fill="#7a4a20"/>
  <!-- Table legs -->
  <rect x="92" y="270" width="16" height="80" fill="#5a3010"/>
  <rect x="292" y="270" width="16" height="80" fill="#5a3010"/>
  <!-- Table leg shadow on floor -->
  <rect x="90" y="350" width="20" height="3" fill="#4a2a10" opacity="0.4"/>
  <rect x="290" y="350" width="20" height="3" fill="#4a2a10" opacity="0.4"/>

  <!-- Potted plant on the right floor -->
  <rect x="346" y="316" width="30" height="34" fill="#a04a20"/>
  <rect x="344" y="312" width="34" height="6" fill="#7a3010"/>
  <!-- Leaves -->
  <rect x="342" y="296" width="8" height="20" fill="#3a6a3a"/>
  <rect x="350" y="288" width="8" height="28" fill="#4a7a4a"/>
  <rect x="358" y="292" width="8" height="24" fill="#3a6a3a"/>
  <rect x="366" y="298" width="8" height="18" fill="#4a7a4a"/>
  <rect x="372" y="300" width="6" height="16" fill="#3a6a3a"/>

  <!-- Small kibble bowl on the right side of table (decorative) -->
  <rect x="276" y="240" width="38" height="4" fill="#7a4a20"/>
  <rect x="278" y="234" width="34" height="8" fill="#c46a3a"/>
  <rect x="282" y="238" width="26" height="4" fill="#e8b87a"/>
</svg>
